name: Publish

on:
  push:
    branches: ["main"]
    tags: ["[0-9]*.[0-9]*.[0-9]*"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"
      - run: dotnet build --configuration Release
      - run: dotnet test --configuration Release --no-build --settings coverage.runsettings
      - name: Enforce 90% line coverage
        run: |
          RATE=$(grep -m1 -oP '(?<=line-rate=")[^"]+' **/TestResults/**/coverage.cobertura.xml)
          PCT=$(echo "$RATE * 100" | bc)
          echo "Line coverage: ${PCT}%"
          if (( $(echo "$PCT < 90" | bc -l) )); then
            echo "::error::Line coverage ${PCT}% is below the 90% threshold"
            exit 1
          fi

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"
      - run: dotnet pack src/SEDAPExpress.Messages --configuration Release --output ./artifacts
      - run: dotnet nuget push ./artifacts/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json
