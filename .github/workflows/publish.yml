name: Publish

on:
  push:
    branches: ["main"]
    tags: ["[0-9]*.[0-9]*.[0-9]*"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"
      - run: dotnet build --configuration Release
      - run: dotnet test --configuration Release --no-build --settings coverage.runsettings
      - run: dotnet tool install -g dotnet-reportgenerator-globaltool
      - run: reportgenerator -reports:"**/TestResults/**/coverage.cobertura.xml" -targetdir:coverage-report "-minimumCoverageThresholds:linecoverage=90"

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"
      - run: dotnet pack src/SEDAPExpress.Messages --configuration Release --output ./artifacts
      - run: dotnet nuget push ./artifacts/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json
